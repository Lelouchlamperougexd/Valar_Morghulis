basePath: /v1
definitions:
  main.ApplicationMessagePayload:
    properties:
      body:
        maxLength: 5000
        type: string
    required:
    - body
    type: object
  main.CreateApplicationPayload:
    properties:
      comment:
        maxLength: 2000
        type: string
      email:
        maxLength: 255
        type: string
      full_name:
        maxLength: 255
        type: string
      has_children:
        type: boolean
      has_pets:
        type: boolean
      is_student:
        type: boolean
      needs_mortgage:
        type: boolean
      occupant_count:
        maximum: 20
        minimum: 1
        type: integer
      phone:
        maxLength: 50
        type: string
      purchase_term:
        maxLength: 255
        type: string
      stay_term_months:
        maximum: 120
        minimum: 0
        type: integer
    required:
    - email
    - full_name
    - phone
    type: object
  main.CreateListingPayload:
    properties:
      address:
        maxLength: 500
        type: string
      area:
        type: number
      city:
        maxLength: 100
        type: string
      deal_type:
        enum:
        - rent
        - sale
        type: string
      description:
        type: string
      floor:
        maximum: 200
        minimum: 0
        type: integer
      media:
        items:
          $ref: '#/definitions/main.ListingMediaPayload'
        maxItems: 20
        type: array
      price:
        type: integer
      project_id:
        type: integer
      property_type:
        maxLength: 50
        type: string
      rent_constraints:
        $ref: '#/definitions/main.RentConstraintsPayload'
      rooms:
        maximum: 20
        minimum: 0
        type: integer
      title:
        maxLength: 255
        type: string
      total_floors:
        maximum: 200
        minimum: 0
        type: integer
    required:
    - city
    - deal_type
    - description
    - price
    - property_type
    - title
    type: object
  main.CreateUserTokenPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - email
    - password
    type: object
  main.ListingMediaPayload:
    properties:
      position:
        minimum: 0
        type: integer
      url:
        type: string
    required:
    - url
    type: object
  main.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/store.User'
    type: object
  main.ProjectPayload:
    properties:
      city:
        maxLength: 100
        type: string
      description:
        maxLength: 2000
        type: string
      name:
        maxLength: 255
        type: string
    required:
    - city
    - name
    type: object
  main.RegisterCompanyPayload:
    properties:
      city:
        maxLength: 100
        type: string
      company_email:
        maxLength: 255
        type: string
      company_name:
        description: Company info
        maxLength: 255
        type: string
      company_phone:
        maxLength: 20
        type: string
      company_type:
        enum:
        - agency
        - developer
        type: string
      first_name:
        description: Contact person
        maxLength: 100
        type: string
      job_title:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        description: Security
        maxLength: 72
        minLength: 8
        type: string
      password_confirmation:
        type: string
      registration_number:
        maxLength: 50
        type: string
    required:
    - city
    - company_email
    - company_name
    - company_phone
    - company_type
    - first_name
    - job_title
    - last_name
    - password
    - password_confirmation
    - registration_number
    type: object
  main.RegisterUserPayload:
    properties:
      email:
        maxLength: 255
        type: string
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      password_confirmation:
        type: string
      phone:
        maxLength: 20
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - password_confirmation
    - phone
    type: object
  main.RentConstraintsPayload:
    properties:
      allow_children:
        type: boolean
      allow_pets:
        type: boolean
      allow_students:
        type: boolean
      max_occupants:
        minimum: 0
        type: integer
      min_term_months:
        minimum: 0
        type: integer
    type: object
  main.UpdateApplicationStatusPayload:
    properties:
      status:
        enum:
        - new
        - review
        - approved
        - rejected
        type: string
    required:
    - status
    type: object
  main.UpdateListingStatusPayload:
    properties:
      status:
        enum:
        - draft
        - moderation
        - active
        - rejected
        - archived
        type: string
    required:
    - status
    type: object
  main.UserWithToken:
    properties:
      company_id:
        type: integer
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      job_title:
        type: string
      last_name:
        type: string
      phone:
        type: string
      push_opt_in:
        type: boolean
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      token:
        type: string
      username:
        type: string
    type: object
  main.VerifyCompanyPayload:
    properties:
      status:
        enum:
        - verified
        - rejected
        type: string
    required:
    - status
    type: object
  store.Application:
    properties:
      comment:
        type: string
      created_at:
        type: string
      deal_type:
        type: string
      email:
        type: string
      full_name:
        type: string
      has_children:
        type: boolean
      has_pets:
        type: boolean
      id:
        type: integer
      is_compatible:
        type: boolean
      is_student:
        type: boolean
      listing_id:
        type: integer
      needs_mortgage:
        type: boolean
      occupant_count:
        type: integer
      phone:
        type: string
      purchase_term:
        type: string
      status:
        type: string
      stay_term_months:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  store.ApplicationMessage:
    properties:
      application_id:
        type: integer
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      sender_user_id:
        type: integer
    type: object
  store.Company:
    properties:
      city:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      registration_number:
        type: string
      type:
        description: '"agency" | "developer"'
        type: string
      updated_at:
        type: string
      verification_status:
        description: '"pending" | "verified" | "rejected"'
        type: string
    type: object
  store.Listing:
    properties:
      address:
        type: string
      area:
        type: number
      city:
        type: string
      company_id:
        type: integer
      created_at:
        type: string
      deal_type:
        type: string
      description:
        type: string
      floor:
        type: integer
      id:
        type: integer
      media:
        items:
          $ref: '#/definitions/store.ListingMedia'
        type: array
      price:
        type: integer
      project_id:
        type: integer
      property_type:
        type: string
      published_at:
        type: string
      rent_constraints:
        $ref: '#/definitions/store.RentConstraints'
      rooms:
        type: integer
      status:
        type: string
      title:
        type: string
      total_floors:
        type: integer
      updated_at:
        type: string
    type: object
  store.ListingMedia:
    properties:
      id:
        type: integer
      listing_id:
        type: integer
      position:
        type: integer
      url:
        type: string
    type: object
  store.Project:
    properties:
      city:
        type: string
      company_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  store.RentConstraints:
    properties:
      allow_children:
        type: boolean
      allow_pets:
        type: boolean
      allow_students:
        type: boolean
      listing_id:
        type: integer
      max_occupants:
        type: integer
      min_term_months:
        type: integer
    type: object
  store.Role:
    properties:
      description:
        type: string
      id:
        type: integer
      level:
        type: integer
      name:
        type: string
    type: object
  store.User:
    properties:
      company_id:
        type: integer
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      job_title:
        type: string
      last_name:
        type: string
      phone:
        type: string
      push_opt_in:
        type: boolean
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      username:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for Real Estate, tool to manage real estate properties and users.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Real Estate API
paths:
  /admin/companies:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of companies (for admin dashboard)
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Company'
            type: array
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Lists companies for admin review
      tags:
      - admin
  /admin/companies/{companyID}:
    get:
      consumes:
      - application/json
      description: Returns a single company
      parameters:
      - description: Company ID
        in: path
        name: companyID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Company'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Gets a company by ID
      tags:
      - admin
  /admin/companies/{companyID}/verify:
    put:
      consumes:
      - application/json
      description: Admin sets the verification status of a company to "verified" or
        "rejected"
      parameters:
      - description: Company ID
        in: path
        name: companyID
        required: true
        type: integer
      - description: Verification status
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.VerifyCompanyPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Company'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Verifies or rejects a company
      tags:
      - admin
  /admin/listings:
    get:
      parameters:
      - description: draft|moderation|active|rejected|archived
        in: query
        name: status
        type: string
      - description: rent|sale
        in: query
        name: deal_type
        type: string
      - description: City
        in: query
        name: city
        type: string
      - description: Property type
        in: query
        name: property_type
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Listing'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List listings for moderation
      tags:
      - admin
  /admin/listings/{listingID}/status:
    put:
      consumes:
      - application/json
      parameters:
      - description: Listing ID
        in: path
        name: listingID
        required: true
        type: integer
      - description: Status payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.UpdateListingStatusPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Listing'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Update listing status (moderation)
      tags:
      - admin
  /applications:
    get:
      description: User sees own apps; company sees apps for its listings
      parameters:
      - description: new|review|approved|rejected
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Application'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List applications (my or company)
      tags:
      - applications
  /applications/{applicationID}/messages:
    get:
      parameters:
      - description: Application ID
        in: path
        name: applicationID
        required: true
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.ApplicationMessage'
            type: array
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List messages for application
      tags:
      - applications
    post:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: applicationID
        required: true
        type: integer
      - description: Message body
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ApplicationMessagePayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.ApplicationMessage'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Send message in application chat
      tags:
      - applications
  /applications/{applicationID}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: applicationID
        required: true
        type: integer
      - description: Status payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.UpdateApplicationStatusPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Application'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Update application status (company)
      tags:
      - applications
  /authentication/admin/token:
    post:
      consumes:
      - application/json
      description: Authenticates an admin or moderator and returns a JWT token. Rejects
        non-admin users.
      parameters:
      - description: Admin credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserTokenPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Admin login successful
          schema:
            $ref: '#/definitions/main.LoginResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Admin login
      tags:
      - authentication
  /authentication/company:
    post:
      consumes:
      - application/json
      description: Registers a company with a contact person account. The company
        will be in "pending" verification status.
      parameters:
      - description: Company and contact person credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.RegisterCompanyPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Company and user registered
          schema:
            $ref: '#/definitions/main.UserWithToken'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Registers a company (agency or developer)
      tags:
      - authentication
  /authentication/me:
    get:
      description: Returns the currently authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.User'
        "401":
          description: Unauthorized
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Get current user
      tags:
      - authentication
  /authentication/token:
    post:
      consumes:
      - application/json
      description: Authenticates a user (any role) and returns a JWT token with user
        info
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserTokenPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/main.LoginResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: User login
      tags:
      - authentication
  /authentication/user:
    post:
      consumes:
      - application/json
      description: Registers a user
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.RegisterUserPayload'
      produces:
      - application/json
      responses:
        "201":
          description: User registered
          schema:
            $ref: '#/definitions/main.UserWithToken'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Registers a user
      tags:
      - authentication
  /health:
    get:
      description: Healthcheck endpoint
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Healthcheck
      tags:
      - ops
  /listings:
    get:
      description: Returns active listings with filters
      parameters:
      - description: rent|sale
        in: query
        name: deal_type
        type: string
      - description: City
        in: query
        name: city
        type: string
      - description: Property type
        in: query
        name: property_type
        type: string
      - description: Min price
        in: query
        name: price_min
        type: integer
      - description: Max price
        in: query
        name: price_max
        type: integer
      - description: Min rooms
        in: query
        name: rooms_min
        type: integer
      - description: Max rooms
        in: query
        name: rooms_max
        type: integer
      - description: Min area
        in: query
        name: area_min
        type: number
      - description: Max area
        in: query
        name: area_max
        type: number
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Listing'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Public catalog listings
      tags:
      - listings
    post:
      consumes:
      - application/json
      description: Create listing; defaults to status=moderation
      parameters:
      - description: Listing data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateListingPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Listing'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Create listing (agency/developer)
      tags:
      - listings
  /listings/{listingID}:
    get:
      parameters:
      - description: Listing ID
        in: path
        name: listingID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Listing'
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Get listing by ID
      tags:
      - listings
  /listings/{listingID}/applications:
    post:
      consumes:
      - application/json
      description: Requires authenticated user; checks rent constraints for compatibility
        flag
      parameters:
      - description: Listing ID
        in: path
        name: listingID
        required: true
        type: integer
      - description: Application data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateApplicationPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Application'
        "400":
          description: Bad Request
          schema: {}
