basePath: /v1
definitions:
  cmd_api.ApplicationMessagePayload:
    properties:
      body:
        maxLength: 5000
        type: string
    required:
    - body
    type: object
  cmd_api.ChangePasswordPayload:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      new_password_confirmation:
        type: string
      old_password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - new_password
    - new_password_confirmation
    - old_password
    type: object
  cmd_api.CreateApplicationPayload:
    properties:
      comment:
        maxLength: 2000
        type: string
      email:
        maxLength: 255
        type: string
      full_name:
        maxLength: 255
        type: string
      has_children:
        type: boolean
      has_pets:
        type: boolean
      is_student:
        type: boolean
      needs_mortgage:
        type: boolean
      occupant_count:
        maximum: 20
        minimum: 1
        type: integer
      phone:
        maxLength: 50
        type: string
      purchase_term:
        maxLength: 255
        type: string
      stay_term_months:
        maximum: 120
        minimum: 0
        type: integer
    required:
    - email
    - full_name
    - phone
    type: object
  cmd_api.CreateComplaintPayload:
    properties:
      description:
        maxLength: 2000
        type: string
      target_id:
        type: integer
      target_type:
        enum:
        - listing
        - company
        type: string
      type:
        enum:
        - incorrect_listing
        - rule_violation
        - fraud
        type: string
    required:
    - description
    - target_id
    - target_type
    - type
    type: object
  cmd_api.CreateInvitePayload:
    properties:
      company_type:
        enum:
        - agency
        - developer
        type: string
    required:
    - company_type
    type: object
  cmd_api.CreateListingPayload:
    properties:
      address:
        maxLength: 500
        type: string
      area:
        type: number
      city:
        maxLength: 100
        type: string
      deal_type:
        enum:
        - rent
        - sale
        type: string
      description:
        type: string
      floor:
        maximum: 200
        minimum: 0
        type: integer
      latitude:
        maximum: 90
        minimum: -90
        type: number
      longitude:
        maximum: 180
        minimum: -180
        type: number
      media:
        items:
          $ref: '#/definitions/cmd_api.ListingMediaPayload'
        maxItems: 20
        type: array
      price:
        type: integer
      project_id:
        type: integer
      property_type:
        maxLength: 50
        type: string
      rent_constraints:
        $ref: '#/definitions/cmd_api.RentConstraintsPayload'
      rooms:
        maximum: 20
        minimum: 0
        type: integer
      title:
        maxLength: 255
        type: string
      total_floors:
        maximum: 200
        minimum: 0
        type: integer
    required:
    - city
    - deal_type
    - description
    - price
    - property_type
    - title
    type: object
  cmd_api.CreateUserTokenPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - email
    - password
    type: object
  cmd_api.InviteResponse:
    properties:
      company_type:
        type: string
      expires_at:
        type: string
      token:
        type: string
      url:
        type: string
    type: object
  cmd_api.ListingMediaPayload:
    properties:
      position:
        minimum: 0
        type: integer
      url:
        type: string
    required:
    - url
    type: object
  cmd_api.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/github_com_sikozonpc_social_internal_store.User'
    type: object
  cmd_api.ProjectPayload:
    properties:
      city:
        maxLength: 100
        type: string
      description:
        maxLength: 2000
        type: string
      name:
        maxLength: 255
        type: string
    required:
    - city
    - name
    type: object
  cmd_api.RegisterCompanyPayload:
    properties:
      city:
        maxLength: 100
        type: string
      company_email:
        maxLength: 255
        type: string
      company_name:
        description: Company info
        maxLength: 255
        type: string
      company_phone:
        maxLength: 20
        type: string
      company_type:
        enum:
        - agency
        - developer
        type: string
      first_name:
        description: Contact person
        maxLength: 100
        type: string
      invite_token:
        description: Optional invite token
        type: string
      job_title:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        description: Security
        maxLength: 72
        minLength: 8
        type: string
      password_confirmation:
        type: string
      registration_number:
        maxLength: 50
        type: string
    required:
    - city
    - company_email
    - company_name
    - company_phone
    - company_type
    - first_name
    - job_title
    - last_name
    - password
    - password_confirmation
    - registration_number
    type: object
  cmd_api.RegisterUserPayload:
    properties:
      email:
        maxLength: 255
        type: string
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      password_confirmation:
        type: string
      phone:
        maxLength: 20
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - password_confirmation
    - phone
    type: object
  cmd_api.RentConstraintsPayload:
    properties:
      allow_children:
        type: boolean
      allow_pets:
        type: boolean
      allow_students:
        type: boolean
      max_occupants:
        minimum: 0
        type: integer
      min_term_months:
        minimum: 0
        type: integer
    type: object
  cmd_api.UpdateApplicationStatusPayload:
    properties:
      status:
        enum:
        - new
        - review
        - approved
        - rejected
        type: string
    required:
    - status
    type: object
  cmd_api.UpdateComplaintStatusPayload:
    properties:
      status:
        enum:
        - new
        - in_progress
        - closed
        type: string
    required:
    - status
    type: object
  cmd_api.UpdateListingStatusPayload:
    properties:
      status:
        enum:
        - draft
        - moderation
        - active
        - rejected
        - archived
        type: string
    required:
    - status
    type: object
  cmd_api.UpdateProfilePayload:
    properties:
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      phone:
        maxLength: 20
        type: string
    type: object
  cmd_api.UserWithToken:
    properties:
      company_id:
        type: integer
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      job_title:
        type: string
      last_name:
        type: string
      phone:
        type: string
      push_opt_in:
        type: boolean
      role:
        $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Role'
      role_id:
        type: integer
      token:
        type: string
      username:
        type: string
    type: object
  cmd_api.ValidateInviteResponse:
    properties:
      company_type:
        type: string
      valid:
        type: boolean
    type: object
  cmd_api.VerifyCompanyPayload:
    properties:
      status:
        enum:
        - verified
        - rejected
        type: string
    required:
    - status
    type: object
  github_com_sikozonpc_social_internal_store.ActivityChartData:
    properties:
      date:
        type: string
      new_companies:
        type: integer
      new_listings:
        type: integer
      new_users:
        type: integer
    type: object
  github_com_sikozonpc_social_internal_store.AdminAction:
    properties:
      action_type:
        type: string
      admin_id:
        type: integer
      admin_name:
        description: Joined from users
        type: string
      admin_role:
        description: Joined from roles
        type: string
      created_at:
        type: string
      details:
        type: string
      id:
        type: integer
      target_id:
        type: integer
      target_type:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.Application:
    properties:
      comment:
        type: string
      created_at:
        type: string
      deal_type:
        type: string
      email:
        type: string
      full_name:
        type: string
      has_children:
        type: boolean
      has_pets:
        type: boolean
      id:
        type: integer
      is_compatible:
        type: boolean
      is_student:
        type: boolean
      listing_id:
        type: integer
      needs_mortgage:
        type: boolean
      occupant_count:
        type: integer
      phone:
        type: string
      purchase_term:
        type: string
      status:
        type: string
      stay_term_months:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  github_com_sikozonpc_social_internal_store.ApplicationMessage:
    properties:
      application_id:
        type: integer
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      sender_user_id:
        type: integer
    type: object
  github_com_sikozonpc_social_internal_store.ApplicationSummary:
    properties:
      company_name:
        type: string
      id:
        type: integer
      listing_title:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.ChatSummary:
    properties:
      application_id:
        type: integer
      company_name:
        type: string
      is_unread:
        type: boolean
      last_message:
        type: string
      last_message_at:
        type: string
      listing_title:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.Company:
    properties:
      city:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      registration_number:
        type: string
      type:
        description: '"agency" | "developer"'
        type: string
      updated_at:
        type: string
      verification_status:
        description: '"pending" | "verified" | "rejected"'
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.Complaint:
    properties:
      author_name:
        description: joined from users.username
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      status:
        description: '"new", "in_progress", "closed"'
        type: string
      target_id:
        type: integer
      target_name:
        description: joined from listings.title or companies.name
        type: string
      target_type:
        description: '"listing" | "company"'
        type: string
      type:
        description: '"incorrect_listing", "rule_violation", "fraud"'
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  github_com_sikozonpc_social_internal_store.DashboardOverview:
    properties:
      active_applications_count:
        type: integer
      favorites_count:
        type: integer
      recent_applications:
        items:
          $ref: '#/definitions/github_com_sikozonpc_social_internal_store.ApplicationSummary'
        type: array
      recent_listings:
        items:
          $ref: '#/definitions/github_com_sikozonpc_social_internal_store.FavoriteListing'
        type: array
      unread_messages_count:
        type: integer
    type: object
  github_com_sikozonpc_social_internal_store.DashboardStats:
    properties:
      on_moderation:
        type: integer
      total_companies:
        type: integer
      total_listings:
        type: integer
      total_users:
        type: integer
    type: object
  github_com_sikozonpc_social_internal_store.FavoriteListing:
    properties:
      area:
        type: number
      city:
        type: string
      cover_url:
        type: string
      created_at:
        type: string
      listing_id:
        type: integer
      price:
        type: integer
      title:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.Listing:
    properties:
      address:
        type: string
      area:
        type: number
      city:
        type: string
      company_id:
        type: integer
      company_name:
        type: string
      created_at:
        type: string
      deal_type:
        type: string
      description:
        type: string
      floor:
        type: integer
      id:
        type: integer
      latitude:
        type: number
      longitude:
        type: number
      media:
        items:
          $ref: '#/definitions/github_com_sikozonpc_social_internal_store.ListingMedia'
        type: array
      price:
        type: integer
      project_id:
        type: integer
      property_type:
        type: string
      published_at:
        type: string
      rent_constraints:
        $ref: '#/definitions/github_com_sikozonpc_social_internal_store.RentConstraints'
      rooms:
        type: integer
      status:
        type: string
      title:
        type: string
      total_floors:
        type: integer
      updated_at:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.ListingMedia:
    properties:
      id:
        type: integer
      listing_id:
        type: integer
      position:
        type: integer
      url:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.Project:
    properties:
      city:
        type: string
      company_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.RentConstraints:
    properties:
      allow_children:
        type: boolean
      allow_pets:
        type: boolean
      allow_students:
        type: boolean
      listing_id:
        type: integer
      max_occupants:
        type: integer
      min_term_months:
        type: integer
    type: object
  github_com_sikozonpc_social_internal_store.Role:
    properties:
      description:
        type: string
      id:
        type: integer
      level:
        type: integer
      name:
        type: string
    type: object
  github_com_sikozonpc_social_internal_store.User:
    properties:
      company_id:
        type: integer
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      job_title:
        type: string
      last_name:
        type: string
      phone:
        type: string
      push_opt_in:
        type: boolean
      role:
        $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Role'
      role_id:
        type: integer
      username:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for Real Estate, tool to manage real estate properties and users.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Real Estate API
paths:
  /admin/companies:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of companies (for admin dashboard)
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Company'
            type: array
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Lists companies for admin review
      tags:
      - admin
  /admin/companies/{companyID}:
    get:
      consumes:
      - application/json
      description: Returns a single company
      parameters:
      - description: Company ID
        in: path
        name: companyID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Company'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Gets a company by ID
      tags:
      - admin
  /admin/companies/{companyID}/verify:
    put:
      consumes:
      - application/json
      description: Admin sets the verification status of a company to "verified" or
        "rejected"
      parameters:
      - description: Company ID
        in: path
        name: companyID
        required: true
        type: integer
      - description: Verification status
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/cmd_api.VerifyCompanyPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Company'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Verifies or rejects a company
      tags:
      - admin
  /admin/complaints:
    get:
      description: Returns a paginated list of complaints, optionally filtered by
        status
      parameters:
      - description: 'Filter by status: new, in_progress, closed'
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Complaint'
            type: array
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List complaints
      tags:
      - admin
  /admin/complaints/{complaintID}:
    get:
      description: Returns a single complaint with target name and author info
      parameters:
      - description: Complaint ID
        in: path
        name: complaintID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Complaint'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Get complaint by ID
      tags:
      - admin
  /admin/complaints/{complaintID}/status:
    patch:
      consumes:
      - application/json
      description: Admin changes the status of a complaint
      parameters:
      - description: Complaint ID
        in: path
        name: complaintID
        required: true
        type: integer
      - description: New status
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/cmd_api.UpdateComplaintStatusPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Complaint'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Update complaint status
      tags:
      - admin
  /admin/invites:
    post:
      consumes:
      - application/json
      description: Admin generates an invite link for a specific company type (agency
        or developer)
      parameters:
      - description: Invite details
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/cmd_api.CreateInvitePayload'
      produces:
      - application/json
      responses:
        "201":
          description: Invite created
          schema:
            $ref: '#/definitions/cmd_api.InviteResponse'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Creates a registration invite link
      tags:
      - admin
  /admin/listings:
    get:
      parameters:
      - description: draft|moderation|active|rejected|archived
        in: query
        name: status
        type: string
      - description: rent|sale
        in: query
        name: deal_type
        type: string
      - description: City
        in: query
        name: city
        type: string
      - description: Property type
        in: query
        name: property_type
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Listing'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List listings for moderation
      tags:
      - admin
  /admin/listings/{listingID}/status:
    put:
      consumes:
      - application/json
      parameters:
      - description: Listing ID
        in: path
        name: listingID
        required: true
        type: integer
      - description: Status payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/cmd_api.UpdateListingStatusPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sikozonpc_social_internal_store.Listing'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Update listing status (moderation)
      tags:
      - admin
  /admin/logs:
    get:
      description: Returns a paginated list of actions performed by administrators
        and moderators
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sikozonpc_social_internal_store.AdminAction'
            type: array
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Lists admin action logs
      tags:
      - admin
  /admin/stats/activity:
    get:
