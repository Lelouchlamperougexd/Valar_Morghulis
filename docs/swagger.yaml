basePath: /v1
definitions:
  main.CreateUserTokenPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - email
    - password
    type: object
  main.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/store.User'
    type: object
  main.RegisterCompanyPayload:
    properties:
      city:
        maxLength: 100
        type: string
      company_email:
        maxLength: 255
        type: string
      company_name:
        description: Company info
        maxLength: 255
        type: string
      company_phone:
        maxLength: 20
        type: string
      company_type:
        enum:
        - agency
        - developer
        type: string
      first_name:
        description: Contact person
        maxLength: 100
        type: string
      job_title:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        description: Security
        maxLength: 72
        minLength: 8
        type: string
      password_confirmation:
        type: string
      registration_number:
        maxLength: 50
        type: string
    required:
    - city
    - company_email
    - company_name
    - company_phone
    - company_type
    - first_name
    - job_title
    - last_name
    - password
    - password_confirmation
    - registration_number
    type: object
  main.RegisterUserPayload:
    properties:
      email:
        maxLength: 255
        type: string
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      password_confirmation:
        type: string
      phone:
        maxLength: 20
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - password_confirmation
    - phone
    type: object
  main.UserWithToken:
    properties:
      company_id:
        type: integer
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      job_title:
        type: string
      last_name:
        type: string
      phone:
        type: string
      push_opt_in:
        type: boolean
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      token:
        type: string
      username:
        type: string
    type: object
  main.VerifyCompanyPayload:
    properties:
      status:
        enum:
        - verified
        - rejected
        type: string
    required:
    - status
    type: object
  main.mapObjectEnvelope:
    properties:
      count:
        type: integer
      id:
        type: integer
      lat:
        type: number
      lng:
        type: number
      price:
        type: integer
      property_type:
        type: string
      rooms:
        type: integer
      type:
        type: string
    type: object
  store.Company:
    properties:
      city:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      registration_number:
        type: string
      type:
        description: '"agency" | "developer"'
        type: string
      updated_at:
        type: string
      verification_status:
        description: '"pending" | "verified" | "rejected"'
        type: string
    type: object
  store.Role:
    properties:
      description:
        type: string
      id:
        type: integer
      level:
        type: integer
      name:
        type: string
    type: object
  store.User:
    properties:
      company_id:
        type: integer
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      job_title:
        type: string
      last_name:
        type: string
      phone:
        type: string
      push_opt_in:
        type: boolean
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      username:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for Real Estate, tool to manage real estate properties and users.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Real Estate API
paths:
  /admin/companies:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of companies (for admin dashboard)
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Company'
            type: array
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Lists companies for admin review
      tags:
      - admin
  /admin/companies/{companyID}:
    get:
      consumes:
      - application/json
      description: Returns a single company
      parameters:
      - description: Company ID
        in: path
        name: companyID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Company'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Gets a company by ID
      tags:
      - admin
  /admin/companies/{companyID}/verify:
    put:
      consumes:
      - application/json
      description: Admin sets the verification status of a company to "verified" or
        "rejected"
      parameters:
      - description: Company ID
        in: path
        name: companyID
        required: true
        type: integer
      - description: Verification status
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.VerifyCompanyPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Company'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Verifies or rejects a company
      tags:
      - admin
  /authentication/admin/token:
    post:
      consumes:
      - application/json
      description: Authenticates an admin or moderator and returns a JWT token. Rejects
        non-admin users.
      parameters:
      - description: Admin credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserTokenPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Admin login successful
          schema:
            $ref: '#/definitions/main.LoginResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Admin login
      tags:
      - authentication
  /authentication/company:
    post:
      consumes:
      - application/json
      description: Registers a company with a contact person account. The company
        will be in "pending" verification status.
      parameters:
      - description: Company and contact person credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.RegisterCompanyPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Company and user registered
          schema:
            $ref: '#/definitions/main.UserWithToken'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Registers a company (agency or developer)
      tags:
      - authentication
  /authentication/me:
    get:
      description: Returns the currently authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.User'
        "401":
          description: Unauthorized
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Get current user
      tags:
      - authentication
  /authentication/token:
    post:
      consumes:
      - application/json
      description: Authenticates a user (any role) and returns a JWT token with user
        info
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserTokenPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/main.LoginResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: User login
      tags:
      - authentication
  /authentication/user:
    post:
      consumes:
      - application/json
      description: Registers a user
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.RegisterUserPayload'
      produces:
      - application/json
      responses:
        "201":
          description: User registered
          schema:
            $ref: '#/definitions/main.UserWithToken'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Registers a user
      tags:
      - authentication
  /health:
    get:
      description: Healthcheck endpoint
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Healthcheck
      tags:
      - ops
  /map/objects:
    get:
      description: Returns map-ready real estate objects or clusters inside the provided
        bounding box
      parameters:
      - description: Minimum latitude
        in: query
        name: lat_min
        required: true
        type: number
      - description: Maximum latitude
        in: query
        name: lat_max
        required: true
        type: number
      - description: Minimum longitude
        in: query
        name: lng_min
        required: true
        type: number
      - description: Maximum longitude
        in: query
        name: lng_max
        required: true
        type: number
      - description: Map zoom level
        in: query
        name: zoom
        type: integer
      - description: City filter (ILIKE)
        in: query
        name: city
        type: string
      - description: Property type
        in: query
        name: property_type
        type: string
      - description: Minimum price
        format: int64
        in: query
        name: price_min
        type: integer
      - description: Maximum price
        format: int64
        in: query
        name: price_max
        type: integer
      - description: Rooms count
        in: query
        name: rooms
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.mapObjectEnvelope'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Map objects within bounding box
      tags:
      - map
  /users:
    get:
      consumes:
      - application/json
      description: Fetches a user profile by email
      parameters:
      - description: User email
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.User'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetches a user profile
      tags:
      - users
  /users/{id}:
    get:
      consumes:
      - application/json
      description: Fetches a user profile by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.User'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetches a user profile
      tags:
      - users
  /users/activate/{token}:
    put:
      description: Activates/Register a user by invitation token
      parameters:
      - description: Invitation token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: User activated
          schema:
            type: string
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Activates/Register a user
      tags:
      - users
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
